name: Snowball
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Snowball:
    type: application
    platform: iOS
    sources:
      - path: Snowball
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snowball
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Snowball/Info.plist
        CODE_SIGN_ENTITLEMENTS: Snowball/Snowball.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SnowballTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SnowballTests
      - path: Snowball.storekit
    dependencies:
      - target: Snowball
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snowball.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Snowball:
    build:
      targets:
        Snowball: all
        SnowballTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Snowball.storekit
    test:
      config: Debug
      storeKitConfiguration: Snowball.storekit
      targets:
        - SnowballTests
    archive:
      config: Release
